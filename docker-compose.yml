services:
  oracle-db:
    image: container-registry.oracle.com/database/free:latest
    ports:
      - "1523:1521"
    environment:
      ORACLE_PWD: oramemvid_dev
    volumes:
      - oracle_data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "sqlplus", "-L", "sys/oramemvid_dev@//localhost:1521/FREEPDB1 as sysdba", "@/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

volumes:
  oracle_data:
